name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    # Apple Silicon runner (the app is macOS/arm64 only: Metal, ScreenCaptureKit, NSPanel).
    # Needs a recent Xcode SDK: the apple-metal Swift bridge uses current Metal APIs.
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Install App Store Connect API key for notarization
        # secrets are not allowed in step `if:` conditions — guard inside the script
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          if [ -n "$APPLE_API_KEY_BASE64" ]; then
            echo "$APPLE_API_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
            echo "App Store Connect API key installed"
          else
            echo "No API key secret set — skipping"
          fi

      - name: Build and create draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional code signing & notarization — leave the secrets unset to
          # build ad-hoc signed artifacts (users must right-click → Open).
          # APPLE_CERTIFICATE: base64-encoded .p12 (Developer ID Application)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # Notarization — either method works; the API key is preferred for CI
          # (a) App Store Connect API key (recommended, 2FA-independent)
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ secrets.APPLE_API_KEY != '' && format('{0}/AuthKey.p8', runner.temp) || '' }}
          # (b) Apple ID + app-specific password
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "kotonoha ${{ github.ref_name }}"
          releaseBody: |
            Fully-local realtime transcription & translation overlay for macOS.

            **Requirements**: macOS 13.3+ (Apple Silicon). Ollama is optional (needed for translation/summaries).

            ---
            _Built automatically from tag `${{ github.ref_name }}`._
          releaseDraft: true
          prerelease: false
          args: --bundles dmg

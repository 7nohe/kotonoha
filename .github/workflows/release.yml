name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    # Apple Silicon runner (the app is macOS/arm64 only: Metal, ScreenCaptureKit, NSPanel).
    # Needs a recent Xcode SDK: the apple-metal Swift bridge uses current Metal APIs.
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      # Optional code signing & notarization. Secrets that are unset must NOT be
      # exported at all: tauri-bundler treats a present-but-empty APPLE_CERTIFICATE
      # as a signing request and fails importing the empty certificate.
      # Without secrets the build falls back to ad-hoc signing (users right-click → Open).
      - name: Configure signing & notarization env
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          export_if_set() {
            local name="$1" value="${!1:-}"
            if [ -n "$value" ]; then
              {
                echo "$name<<__GH_ENV_EOF__"
                echo "$value"
                echo "__GH_ENV_EOF__"
              } >> "$GITHUB_ENV"
              echo "exported $name"
            fi
          }
          for v in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY \
                   APPLE_API_ISSUER APPLE_API_KEY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
            export_if_set "$v"
          done
          if [ -n "${APPLE_API_KEY_BASE64:-}" ]; then
            echo "$APPLE_API_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
            echo "APPLE_API_KEY_PATH=$RUNNER_TEMP/AuthKey.p8" >> "$GITHUB_ENV"
            echo "exported APPLE_API_KEY_PATH"
          fi

      - name: Build and create draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "kotonoha ${{ github.ref_name }}"
          releaseBody: |
            Fully-local realtime transcription & translation overlay for macOS.

            **Requirements**: macOS 13.3+ (Apple Silicon). Ollama is optional (needed for translation/summaries).

            ---
            _Built automatically from tag `${{ github.ref_name }}`._
          releaseDraft: true
          prerelease: false
          args: --bundles dmg
